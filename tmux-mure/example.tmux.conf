# Example mure user snippet for ~/.tmux.conf
#
# 1. Install via TPM:
set -g @plugin '<owner>/tmux-mure'
#
# 2. Append the mure status snippet to your existing status-right.
#    The plugin will not overwrite status-right; you opt in here.
set -g status-right '#{@mure-status-format}%H:%M'
#
# 3. (optional) Override defaults before `run '~/.tmux/plugins/tpm/tpm'`.
# set -g @mure-sidebar-width    40
# set -g @mure-sidebar-position right
# set -g @mure-sidebar-key      S
# @mure-spawn-target accepts `subagents-window` (default; find-or-create a
# dedicated window) or any tmux pane-creating command. mure appends
# `-P -F '#{pane_id}' <payload>` and runs it.
# set -g @mure-spawn-target     'split-window -v'
# set -g @mure-spawn-target     'split-window -h -f -l 40%'
# set -g @mure-spawn-target     'new-window -t :9'
