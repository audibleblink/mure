# GoReleaser config for the `mure` Go binary.
# Triggered on tags matching `mure-v*` (e.g. `mure-v0.1.0`). Other tag
# prefixes — `pi-mure-vX.Y.Z`, `tmux-mure-vX.Y.Z` — are published from
# the TS package registry / TPM respectively; see README "Release flow".
version: 2

project_name: mure

before:
  hooks:
    - go mod tidy
    - make sync-piext

builds:
  - id: mure
    main: ./cmd/mure
    binary: mure
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: mure
    name_template: "mure_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

# Homebrew tap template. The tap repository is out of scope for this
# repo; configure GORELEASER_GITHUB_TOKEN with push access to publish.
brews:
  - name: mure
    repository:
      owner: example
      name: homebrew-mure
    homepage: "https://github.com/example/mure"
    description: "tmux-native multiplexer for coding-agent panes"
    skip_upload: auto
    install: |
      bin.install "mure"
    test: |
      system "#{bin}/mure", "doctor"

release:
  github:
    owner: example
    name: mure
  prerelease: auto
  name_template: "mure {{.Version}}"
