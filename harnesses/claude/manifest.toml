manifest_version = 1
name = "claude"
display = "Claude Code"
command = "claude"
# `claude` takes the prompt as a positional argument (see `claude --help`).
task_arg = "positional"

[capabilities]
spawn = true
status = true
result = true
subtools = true

# Skill + hooks are colocated under ~/.claude/skills/mure/. Claude Code
# auto-discovers the skill, and the hooks declared in its frontmatter
# fire automatically while the skill is active. No settings.json edit
# required.
[install.skill]
path = "~/.claude/skills/mure/SKILL.md"
merge = "replace"

[[install.files]]
src = "scripts/pre-tool-use.sh"
dst = "~/.claude/skills/mure/scripts/pre-tool-use.sh"
mode = "0755"

[[install.files]]
src = "scripts/post-tool-use.sh"
dst = "~/.claude/skills/mure/scripts/post-tool-use.sh"
mode = "0755"

[[install.files]]
src = "scripts/stop.sh"
dst = "~/.claude/skills/mure/scripts/stop.sh"
mode = "0755"
